services:
  postgres:
    image: postgres:17-alpine
    container_name: nyx-postgres
    environment:
      POSTGRES_USER: nyx
      POSTGRES_PASSWORD: nyx
      POSTGRES_DB: nyx
    ports:
      - "5432:5432"
    volumes:
      - nyx_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nyx"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  nyx_pg_data:
