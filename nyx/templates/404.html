{% extends "layout/error.html" %}
{% block title %}404{% endblock %}

{% block content %}
<div class="d-flex flex-column align-center text-center" style="gap: 0.75rem; max-width: 420px; padding: 2rem;">
    <i class="bi bi-compass text-tertiary" style="font-size: 3rem;"></i>
    <span class="text-4xl font-bold text-tertiary">404</span>
    <h1 class="text-xl font-semibold text-emp m-0">Página não encontrada</h1>
    <p class="text-secondary m-0">O endereço que você acessou não existe ou foi removido.</p>
    <a href="{% url 'core:index' %}" class="btn btn-secondary mt-2">
        <i class="bi bi-house me-1"></i> Voltar ao início
    </a>
</div>
{% endblock %}
