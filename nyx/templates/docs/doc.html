{% extends base_template %}

{% block title %}{{ entry.title }} — Docs{% endblock %}

{% block main %}
<div class="doc-page" data-keybind-group="docs-{{ entry.title|slugify }}">

    <div class="doc-header">
        <h1 class="doc-title">{{ entry.title }}</h1>
        {% if entry.tags %}
        <div class="doc-tags">
            {% for tag in entry.tags %}
            <span class="doc-tag">{{ tag }}</span>
            {% endfor %}
        </div>
        {% endif %}
    </div>

    <div class="doc-prose">
        {{ content|safe }}
    </div>

</div>
{% endblock %}
