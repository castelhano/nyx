{# _action_button.html — Renderizado pela template tag action_button. #}
{% if visible %}
<a href="{{ url }}"
   class="nyx-action nyx-action--{{ action.style }}"
   hx-get="{{ url }}"
   hx-target="#main-content"
   hx-push-url="true"
   {% if action.icon %}title="{{ action.label }}"{% endif %}>
    {% if action.icon %}<i class="{{ action.icon }}"></i>{% endif %}
    {{ action.label }}
</a>
{% endif %}
