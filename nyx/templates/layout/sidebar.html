<aside class="sidebar" data-component="sidebar">

    <div class="sidebar__header">
        <span class="sidebar__logo">Nyx <sup class="text-discovery"><i class="bi bi-braces-asterisk"></i></sup></span>
        <button class="btn btn-sm btn-ghost sidebar__toggle" data-sidebar-toggle title="Recolher menu">
            <i class="bi bi-layout-sidebar"></i>
        </button>
    </div>

    <nav class="sidebar__nav" aria-label="navegação principal">

        <search class="sidebar__search px-2">
            <div class="input-icon-wrap">
                <input
                    type="search"
                    id="sidebar_search_input"
                    class="form-control form-control-sm has-icon-end"
                    placeholder="Pesquisa"
                    data-keybind="f3"
                    data-keybind-desc="Pesquisar menu"
                    data-sidebar-search>
                <span class="input-icon input-icon-end">F3</span>
            </div>
        </search>
        <div class="sidebar__search-btn px-2">
            <button class="btn btn-sm btn-ghost w-100" type="button" title="Pesquisa" data-sidebar-search-btn>
                <i class="bi bi-search"></i>
            </button>
        </div>

        {% for group in nav_groups %}
        <div class="sidebar__group open" data-sidebar-group>
            <button class="btn btn-sm btn-ghost btn-dropdown sidebar__group-toggle mx-2" data-sidebar-group-toggle type="button">
                {% if group.app_ui.icon %}
                <span class="sidebar__group-icon"><i class="{{ group.app_ui.icon }}"></i></span>
                {% endif %}
                <span class="sidebar__group-label">{{ group.label }}</span>
            </button>
            <div class="sidebar__group-content">
                <div>
                {% for item in group.items %}
                <a href="{% url item.entry.list_url %}"
                   class="sidebar__link btn btn-sm btn-ghost mx-2{% if item.active %} active{% endif %}"
                   data-sidebar-link
                   hx-get="{% url item.entry.list_url %}"
                   hx-target="#main-content"
                   hx-push-url="true">
                    <span class="sidebar__link-icon">
                        {% if item.icon_is_char %}
                            <span class="sidebar__icon-char">{{ item.icon }}</span>
                        {% else %}
                            <i class="{{ item.icon }}"></i>
                        {% endif %}
                    </span>
                    <span class="sidebar__link-label">{{ item.label }}</span>
                </a>
                {% endfor %}
                </div>
            </div>
        </div>
        {% endfor %}

    </nav>

</aside>
