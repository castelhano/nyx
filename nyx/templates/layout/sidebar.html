<aside class="sidebar">

    <span id="HORA_FOO"></span>
    <div class="sidebar__header">
        <span class="sidebar__logo">Nyx</span>
    </div>

    <nav class="sidebar__nav" aria-label="navegação principal">
        {% for group_label, items in nav_groups.items %}
        <div class="sidebar__group">
            <span class="sidebar__group-label">{{ group_label }}</span>
            {% for item in items %}
            <a href="{% url item.entry.list_url %}"
               class="sidebar__link{% if item.active %} active{% endif %}"
               hx-get="{% url item.entry.list_url %}"
               hx-target="#main-content"
               hx-push-url="true">
                {{ item.label }}
            </a>
            {% endfor %}
        </div>
        {% endfor %}
    </nav>

    <script>
        window.onload = function() {
    const agora = new Date();
    // Formata para o padrão brasileiro (DD/MM/AAAA HH:MM:SS)
    const dataFormatada = agora.toLocaleString('pt-BR');
    
    document.getElementById('HORA_FOO').innerText = dataFormatada;
};

    </script>

</aside>
