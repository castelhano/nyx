{% extends "layout/base.html" %}

{% block title %}Início{% endblock %}

{% block main %}
<main class="p-4">
    <section class="">
        <div class="grid">
            <c-tabs variant="tabs--pills">
                <c-slot name="tabs">
                    <button class="tabs__tab active" data-tab="dados"   role="tab">Dados</button>
                    <button class="tabs__tab"        data-tab="config"  role="tab">Configurações</button>
                </c-slot>
                <div class="tabs__panel active" data-panel="dados">
                    <p>Conteúdo da aba Dados</p>
                </div>
                <div class="tabs__panel" data-panel="config">
                    <p>Conteúdo da aba Configurações</p>
                </div>
            </c-tabs>
            <c-dropdown label="Opções" trigger_class="btn-outline btn-sm">
                <li class="dropdown-item">Editar</li>
                <li class="dropdown-item dropdown-item--danger">Excluir</li>
            </c-dropdown>
            <c-dropdown label="Menu" menu_class="dropdown-menu--end">
                <li class="dropdown-item">Editar</li>
                <li class="dropdown-divider"></li>
                <li class="dropdown-item dropdown-item--danger">Excluir</li>
            </c-dropdown>
        </div>
    </section>
</main>
{% endblock %}
