{% extends "layout/base.html" %}

{% block title %}Início{% endblock %}

{% block main %}
<section class="p-4">
    <div>
        <button class="btn btn-sm btn-brand">btn btn-brand</button>
        <button class="btn btn-sm btn-brand btn-outline">btn btn-brand btn-outline</button>
        <button class="btn btn-sm btn-ghost-brand">btn btn-ghost-brand</button>
        <button class="btn btn-sm btn-outline-brand">btn btn-outline-brand</button>
        <button class="btn btn-sm btn-success">btn btn-success</button>
        <button class="btn btn-sm btn-danger">btn btn-danger</button>
        <button class="btn btn-sm btn-ghost btn-dropdown" onclick="alert('Fui clicado')" data-keybind="alt+1">btn btn-ghost</button>
    </div>
    <div class="mt-3">
        <button class="btn btn-brand">btn btn-brand</button>
        <button class="btn btn-brand btn-outline">btn btn-brand btn-outline</button>
        <button class="btn btn-ghost-brand">btn btn-ghost-brand</button>
        <button class="btn btn-outline-brand">btn btn-outline-brand</button>
        <button class="btn btn-success">btn btn-success</button>
        <button class="btn btn-danger">btn btn-danger</button>
        <button class="btn btn-ghost btn-dropdown" onclick="alert('Fui clicado')" data-keybind="alt+1">btn btn-ghost</button>
    </div>
    <div class="d-grid grid-cols-1 mt-3 gap-2">
        <label class="form-switch" for="recuso">
            <input type="checkbox" id="recuso" class="form-switch-input">
            Eu aceito os termos
        </label>
        <label class="form-switch" for="FEI">
            <input type="checkbox" id="FEI" class="form-switch-input">
            Coisa linda
        </label>
        
        <label class="form-check" for="uagsa">
            <input class="form-check-input" type="checkbox" id="uagsa">
            Check 1
        </label>
        <label class="form-check" for="iaosdkjasd">
            <input class="form-check-input" type="checkbox" id="iaosdkjasd">
            Check 2
        </label>
        
        <div class="p-3 gap-3 d-flex flex-wrap rounded border">
            <span class="w-full">Titulo</span>
            <label class="form-check" for="qwejsdkajs">
                <input class="form-check-input" type="checkbox" id="qwejsdkajs">
                Check 1
            </label>
            <label class="form-check" for="oapapopoapoa">
                <input class="form-check-input" type="checkbox" id="oapapopoapoa">
                Check 2
            </label>
        </div>
        
        <div class="border p-3 rounded d-flex gap-3 bg-tertiary">
            <span class="text-primary">Sexo: </span>
            <label class="form-check" for="masc">
                <input class="form-check-input" type="radio" id="masc" name="genero" value="m">
                Masculino
            </label>
            <label class="form-check" for="fem">
                <input class="form-check-input" type="radio" id="fem" name="genero" value="f">
                Feminino
            </label>
        </div>
        <div class="border px-3 py-2 rounded d-flex gap-3">
            <span class="text-muted">Sexo: </span>
            <label class="form-check" for="masc">
                <input class="form-check-input" type="radio" id="masc" name="genero" value="m">
                Masculino
            </label>
            <label class="form-check" for="fem">
                <input class="form-check-input" type="radio" id="fem" name="genero" value="f">
                Feminino
            </label>
        </div>
        <div class="border px-3 py-1 rounded d-flex gap-3 bg-secondary">
            <span class="text-muted">Sexo: </span>
            <label class="form-check" for="masc">
                <input class="form-check-input" type="radio" id="masc" name="genero" value="m">
                Masculino
            </label>
            <label class="form-check" for="fem">
                <input class="form-check-input" type="radio" id="fem" name="genero" value="f">
                Feminino
            </label>
        </div>
    </div>
    <div class="d-grid grid-cols-4 mt-5">
        <div class="">
            <label for="" class="form-label">Nome</label>
            <input type="text" id="" class="form-control form-control-sm is-invalid" placeholder="Nome" />
            <div class="form-feedback invalid">Nome obrigatório</div>
            <input type="text" id="" class="mt-3 form-control is-invalid" placeholder="Nome" />
            <input type="text" id="" class="mt-3 form-control form-control-sm is-valid" placeholder="Nome" />
            <div class="input-icon-wrap mt-3">
                <input type="text" id="" class="form-control form-control-sm has-icon-end is-valid" placeholder="Nome" />
                <span class="input-icon input-icon-end"><i class="bi bi-search"></i></span>
            </div>
            <div class="form-hint">Este eh um hint</div>
            <div class="input-icon-wrap mt-3">
                <input type="text" id="" class="form-control has-icon-end is-invalid" placeholder="Nome" />
                <span class="input-icon input-icon-end"><i class="bi bi-bell-slash-fill"></i></span>
            </div>
            <select name="" id="" class="form-control mt-3">
                <option value="">Foo</option>
                <option value="1">Bar</option>
            </select><br>
            <select name="" id="" class="form-control form-control-sm is-valid mt-3">
                <option value="">Um texto bem longo para ver como se comporta, ainda tem que ser maior ainda</option>
                <option value="1">Bar</option>
            </select>
        </div>
    </div>

    <div>
        <div class="dropdown" data-component="dropdown">
            <button class="btn btn-outline btn-dropdown" data-dropdown-toggle>Opções</button>
            <ul class="dropdown-menu" data-dropdown-menu>
                <li class="dropdown-item">Editar</li>
                <li class="dropdown-item">Duplicar</li>
                <li class="dropdown-divider"></li>
                <li class="dropdown-item dropdown-item--danger">Excluir</li>
            </ul>
        </div>

    </div>
</section>
{% endblock %}

{% block toasts %}
<c-toast type="success">
    Foo
</c-toast>
{% endblock %}
