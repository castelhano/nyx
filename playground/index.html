<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playground — Tailwind + Lucide</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            border:     'hsl(var(--border))',
            input:      'hsl(var(--input))',
            ring:       'hsl(var(--ring))',
            background: 'hsl(var(--background))',
            foreground: 'hsl(var(--foreground))',
            primary:    { DEFAULT: 'hsl(var(--primary))', foreground: 'hsl(var(--primary-foreground))' },
            muted:      { DEFAULT: 'hsl(var(--muted))',   foreground: 'hsl(var(--muted-foreground))' },
            accent:     { DEFAULT: 'hsl(var(--accent))',  foreground: 'hsl(var(--accent-foreground))' },
            card:       { DEFAULT: 'hsl(var(--card))',    foreground: 'hsl(var(--card-foreground))' },
          },
          borderRadius: { sm: 'calc(var(--radius) - 4px)', md: 'calc(var(--radius) - 2px)', lg: 'var(--radius)' },
        },
      },
    }
  </script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    /* CSS vars — mesmos tokens do projeto */
    :root {
      --background: 0 0% 100%; --foreground: 240 10% 3.9%;
      --card: 0 0% 100%;       --card-foreground: 240 10% 3.9%;
      --primary: 240 5.9% 10%; --primary-foreground: 0 0% 98%;
      --muted: 240 4.8% 95.9%; --muted-foreground: 240 3.8% 46.1%;
      --accent: 240 4.8% 95.9%; --accent-foreground: 240 5.9% 10%;
      --border: 240 5.9% 90%;  --input: 240 5.9% 90%;
      --ring: 240 5.9% 10%;
      --radius: 0.5rem;
    }
    .dark {
      --background: 240 10% 3.9%; --foreground: 0 0% 98%;
      --card: 240 10% 3.9%;       --card-foreground: 0 0% 98%;
      --primary: 0 0% 98%;        --primary-foreground: 240 5.9% 10%;
      --muted: 240 3.7% 15.9%;    --muted-foreground: 240 5% 64.9%;
      --accent: 240 3.7% 15.9%;   --accent-foreground: 0 0% 98%;
      --border: 240 3.7% 15.9%;   --input: 240 3.7% 15.9%;
      --ring: 240 4.9% 83.9%;
    }
    body { background: hsl(var(--background)); color: hsl(var(--foreground)); }
  </style>
</head>
<body class="p-8 font-sans text-sm">

  <!-- Toggle dark/light -->
  <div class="flex items-center gap-3 mb-8">
    <span class="text-muted-foreground font-mono text-xs">playground</span>
    <button
      onclick="document.documentElement.classList.toggle('dark')"
      class="ml-auto flex items-center gap-1.5 px-3 py-1.5 rounded-md border border-border hover:bg-accent text-xs"
    >
      <i data-lucide="sun-moon" class="w-3.5 h-3.5"></i>
      dark / light
    </button>
  </div>

  <!-- ============================================================ -->
  <!-- COLE SEUS COMPONENTES AQUI                                   -->
  <!-- ============================================================ -->

  <!-- Exemplo: rodapé de paginação -->
  <section class="mb-8">
    
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" 
      class="lucide lucide-arrow-right-from-line-icon lucide-arrow-right-from-line w-4 h-4">
      <path d="M3 5v14"/><path d="M21 12H7"/><path d="m15 18 6-6-6-6"/>
    </svg>
    
    <p class="text-xs text-muted-foreground mb-3">rodapé paginação</p>
    <div class="flex items-center gap-2 text-sm text-muted-foreground">
      <span>1–20 de 450 | &lt;1 / 22&gt;</span>
      <button class="p-1.5 rounded hover:bg-accent">
        <i data-lucide="arrow-left-from-line" class="w-4 h-4"></i>
      </button>
      <button class="p-1.5 rounded hover:bg-accent">
        <i data-lucide="arrow-right-from-line" class="w-4 h-4"></i>
      </button>
    </div>
  </section>

  <hr>

<!-- Footer da Tabela -->
<div class="flex items-center justify-between px-6 py-4 bg-white border-t border-gray-100 font-sans">
  
  <!-- Esquerda: Contador Minimalista -->
  <div class="text-sm text-gray-400">
    Mostrando <span class="font-semibold text-gray-700">1</span> - <span class="font-semibold text-gray-700">10</span> de <span class="font-semibold text-gray-700">85</span>
  </div>
  
  <!-- Direita: Controles de Navegação -->
  <div class="flex items-center gap-6">
    <!-- Indicador de Página -->
    <span class="text-sm text-gray-400">
      Página <span class="font-semibold text-gray-700">1</span> de <span class="font-semibold text-gray-700">9</span>
    </span>
    
    <!-- Botões -->
    <div class="flex items-center gap-2">
      <button class="p-2 rounded-lg border border-gray-200 text-gray-400 hover:bg-gray-50 hover:text-gray-600 transition-all disabled:opacity-30">
        <i data-lucide="chevron-left" class="w-4 h-4"></i>
      </button>
      
      <button class="p-2 rounded-lg border border-gray-200 text-gray-400 hover:bg-gray-50 hover:text-gray-600 transition-all">
        <i data-lucide="chevron-right" class="w-4 h-4"></i>
      </button>
    </div>
  </div>
</div>

<!-- Script para renderizar os ícones no Playground -->
<script src="https://unpkg.com"></script>
<script>
  lucide.createIcons();
</script>


  <!-- ============================================================ -->

  <script> lucide.createIcons() </script>
</body>
</html>
